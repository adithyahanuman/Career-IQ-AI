
                        <!-- ══ CAREER ROADMAP TAB ══════════════════════════════════════ -->

                        <!-- Form Section -->
                        <div class="crm-form-wrap">
                            <div class="crm-form-header">
                                <h1 class="crm-title">🗺️ Career Roadmap</h1>
                                <p class="crm-subtitle">Generate your AI-powered visual career transition plan, tailored from your resume.</p>
                            </div>

                            <div class="crm-field">
                                <label for="crmTargetRole">🎯 What is your target role or dream job?</label>
                                <input
                                    type="text"
                                    id="crmTargetRole"
                                    placeholder="e.g. Machine Learning Engineer, Product Manager, SDE-2"

                                    ✨ We will automatically extract your current skills, experience, and background from your analyzed resume.
                                </p>

                            <button class="crm-generate-btn" id="crmGenerateBtn">

                                Generate Roadmap with AI

                        </div>

                        <div id="crmVisualOutput" class="crm-visual-output">

                            <!-- Hero Section -->
                            <section class="crm-hero" id="crmHeroSection">

                            </section>

                            <!-- Phase Timeline (SVG road + cards) -->
                            <section class="crm-timeline-section" id="crmTimeline">
                                <div class="crm-svg-container" id="crmSvgContainer"></div>
                                <div class="crm-phases-container" id="crmPhasesContainer"></div>

                            <footer class="crm-summary-footer" id="crmSummaryFooter"></footer>
